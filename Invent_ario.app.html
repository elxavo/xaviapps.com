<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Velastegui Pantry Gold PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.21.0/dist/index.min.js"></script>
  <style>
    :root { --primary:#2c3e50; --accent:#3498db; --danger:#e74c3c; --warning:#f39c12; --success:#27ae60; --bg:#f4f7f6; --text:#333; }
    body { margin:0; font-family:Segoe UI, sans-serif; background:var(--bg); color:var(--text); padding-bottom:110px; }
    header { background:var(--primary); color:#fff; padding:12px 15px; position:sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; }
    .container { padding:15px; max-width:760px; margin:auto; }
    .card { background:#fff; padding:18px; margin-bottom:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); border-left:6px solid #ddd; }
    .hidden { display:none !important; }
    input, button, select { width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; font-size:16px; box-sizing:border-box; }
    button { background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:#ecf0f1; font-size:12px; }
    .family-panel { position:absolute; top:64px; right:15px; z-index:1500; background:#fff; border:1px solid #ddd; border-radius:12px; padding:12px; width:280px; }
  </style>
</head>
<body>
  <header>
    <div>
      <b>Velastegui Pantry Gold PRO</b>
      <button onclick="toggleFamilyPanel()" style="width:auto; padding:5px 10px; font-size:12px; margin-left:10px;">FAMILY</button>
      <div id="family-display" class="pill">CARGANDO...</div>
    </div>
    <button onclick="auth.signOut()" style="width:auto; padding:5px 10px; font-size:12px;">Logout</button>
  </header>

  <div id="family-panel" class="family-panel hidden">
    <div id="family-code-text" style="font-weight:bold; text-align:center; padding:10px;">-----</div>
    <button onclick="navigator.clipboard.writeText(familyId).then(()=>Swal.fire('Copiado!'))">Copiar</button>
  </div>

  <div id="auth-screen" class="container">
    <div class="card">
      <h3>PANTRY LOGIN</h3>
      <input id="user-name" type="text" placeholder="Tu Nombre">
      <input id="email" type="email" placeholder="Email">
      <input id="pass" type="password" placeholder="Password">
      <input id="family-code" type="text" placeholder="Código Familiar">
      <button onclick="handleAuth('login')">ENTRAR</button>
      <button onclick="handleAuth('register')" style="background:none; color:var(--accent);">REGISTRARSE</button>
    </div>
  </div>

  <div id="main-app" class="container hidden">
    <input id="upc" type="text" placeholder="UPC" onchange="handleUPCChange(this.value)">
    <input id="product" type="text" placeholder="Nombre Producto">
    <button onclick="saveItem()">GARDAR</button>
    <button onclick="sugerenciaChefIA()">CHEFAI RECETA</button>
    <div id="inventory-list"></div>
  </div>

  <script>
    const firebaseConfig = { /* TU CONFIG */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const genAI = new GoogleGenerativeAI("AIzaSyCxMRqavNSSeRNfVk7UayR-llE_71R4NNI");
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    let familyId = null;
    let inventoryData = [];

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
        return;
      }
      const ref = db.collection('users').doc(user.uid);
      const uDoc = await ref.get();
      familyId = uDoc.exists ? uDoc.data().familyId : Math.random().toString(36).substring(2,8).toUpperCase();
      if (!uDoc.exists) await ref.set({ familyId });
      
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      document.getElementById('family-display').innerText = `FAMILIA: ${familyId}`;
      document.getElementById('family-code-text').innerText = familyId;
      
      db.collection('families').doc(familyId).collection('inventory').onSnapshot(snap => {
        inventoryData = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderList();
      });
    });

    window.handleUPCChange = async (upc) => {
      const local = inventoryData.find(i => i.id === upc);
      if (local) { /* ... autocompletar ... */ return; }
      const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${upc}.json`);
      const data = await r.json();
      if(data.status === 1) document.getElementById('product').value = data.product.product_name;
    };

    window.toggleFamilyPanel = () => document.getElementById('family-panel').classList.toggle('hidden');
    window.handleAuth = async (type) => { /* ... login/register ... */ };
    window.saveItem = async () => { /* ... guardar ... */ };
    window.sugerenciaChefIA = async () => { /* ... IA ... */ };
    function renderList() { /* ... render ... */ }
  </script>
</body>
</html>
