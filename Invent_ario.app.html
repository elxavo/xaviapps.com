<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Family Pantry Gold PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; 
            --warning: #f39c12; --success: #27ae60; --expired: #9b59b6;
            --bg: #f4f7f6; --text: #333; 
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        header { 
            background: var(--primary); color: white; padding: 10px 15px; 
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .header-center { flex: 2; font-size: 14px; text-align: center; line-height: 1.2; text-transform: uppercase; }
        .header-btn {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 11px; padding: 8px 5px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; min-width: 55px;
        }
        
        .container { padding: 15px; max-width: 700px; margin: auto; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        /* Estados */
        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        .status-critical { border-left-color: var(--danger); }
        .status-expired { border-left-color: var(--expired); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); background: #f9f9f9; }

        #video-container { width: 100%; display: none; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        video { width: 100%; height: auto; }

        #auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: white; border-radius: 14px; padding: 25px; width: 100%; max-width: 360px; }
        
        #loading-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.3s; }
        #loading-screen.fade { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="font-size:20px; font-weight:bold;">FAMILY PANTRY PRO</div>
    <div id="loading-msg" style="font-size:13px; opacity:0.6;">Verificando sesión...</div>
</div>

<div id="auth-screen" style="display:none;">
    <div class="auth-box">
        <h2 style="text-align:center;">PANTRY PRO</h2>
        <input id="auth-name" type="text" placeholder="Tu nombre" style="margin-bottom:10px;">
        <input id="auth-email" type="email" placeholder="Email" style="margin-bottom:10px;">
        <input id="auth-pass" type="password" placeholder="Contraseña" style="margin-bottom:10px;">
        <input id="auth-code" type="text" placeholder="Código familiar (Opcional)" style="text-transform:uppercase; margin-bottom:15px;">
        <button onclick="doLogin()">ENTRAR</button>
        <button onclick="doRegister()" style="background:none; color:var(--accent); border:1px solid var(--accent); margin-top:8px;">REGISTRARSE</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <header>
        <button class="header-btn" onclick="toggleLang()">🌐 <span id="lang-label">EN/ES</span></button>
        <div class="header-center">FAMILY<br>PANTRY PRO</div>
        <button class="header-btn" onclick="toggleShare()">👨‍👩‍👧 <span id="share-label">FAMILIA</span></button>
        <button class="header-btn" onclick="doLogout()" style="background:rgba(231,76,60,0.3);">⎋ <span id="logout-label">SALIR</span></button>
    </header>

    <div class="container">
        <!-- BOTONES IA -->
        <div class="grid-3" style="margin-bottom: 15px;">
            <button onclick="sugerenciaChefIA()" style="background: #6c5ce7; font-size:12px;">👨‍🍳 CHEF IA</button>
            <button onclick="analizarRecetaIA()" style="background: #00b894; font-size:12px;">🔍 ANALIZAR</button>
        </div>

        <div id="view-add" class="card">
            <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;">📷 ESCANEAR CÓDIGO</button>
            <div id="video-container"></div>
            <label>Producto</label>
            <input id="upc" type="text" placeholder="UPC / Barcode" onchange="handleUPCChange(this.value)" style="margin-bottom:10px;">
            <input id="product" type="text" placeholder="Nombre del producto" style="margin-bottom:10px;">
            
            <div class="grid-3">
                <select id="category">
                    <option>PRODUCE</option><option>BAKERY</option><option>MEAT_DELI</option>
                    <option>PANTRY_DRY</option><option>FROZEN</option><option>DAIRY</option>
                    <option>CLEANING</option><option>OTHERS</option>
                </select>
                <input id="expiry" type="date">
                <input id="qty" type="number" placeholder="Cant">
            </div>
            <button onclick="saveItem()" style="background:var(--success); margin-top:15px;">GUARDAR PRODUCTO</button>
        </div>

        <h3 id="list-title">Inventario</h3>
        <div id="inventory-list"></div>
    </div>
</div>

<nav>
    <div onclick="toggleView('inventory')" id="nav-inv" class="active">📦 INVENTARIO</div>
    <div onclick="toggleView('shopping')" id="nav-shop">🛒 COMPRAS</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, increment, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const firebaseConfig = {
        apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
        authDomain: "velastegui-pantry.firebaseapp.com",
        projectId: "velastegui-pantry",
        storageBucket: "velastegui-pantry.firebasestorage.app",
        messagingSenderId: "927651602097",
        appId: "1:927651602097:web:b243cfa8aff28886900c90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const genAI = new GoogleGenerativeAI("AIzaSyCxMRqavNSSeRNfVk7UayR-llE_71R4NNI");
    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    let inventoryData = [], familyId = null, lang = 'es';

    // --- AUTH & SESSION ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            const uDoc = await getDoc(userRef);
            familyId = uDoc.exists() ? uDoc.data().familyId : "FAM-" + Math.random().toString(36).substr(2,5).toUpperCase();
            if(!uDoc.exists()) await setDoc(userRef, { familyId, email: user.email });
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            onSnapshot(collection(db, "families", familyId, "inventory"), (snap) => {
                inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList();
            });
            hideLoading();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            hideLoading();
        }
    });

    window.doLogin = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value);
    window.doLogout = () => signOut(auth);

    // --- IA FUNCTIONS ---
    window.sugerenciaChefIA = async () => {
        const stock = inventoryData.filter(i => i.qty > 0).map(i => i.name).join(", ");
        if(!stock) return Swal.fire("Vacío", "No hay ingredientes", "info");
        showLoading("Cocinando ideas...");
        try {
            const res = await model.generateContent(`Con estos ingredientes: ${stock}. Sugiere una receta latina corta.`);
            Swal.fire("Sugerencia IA", res.response.text(), "success");
        } catch(e) { Swal.fire("Error", "IA no disponible", "error"); }
        hideLoading();
    };

    window.analizarRecetaIA = async () => {
        const { value: plato } = await Swal.fire({ title: '¿Qué quieres cocinar?', input: 'text' });
        if (!plato) return;
        showLoading("Buscando ingredientes...");
        const stock = inventoryData.map(i => i.name).join(", ");
        try {
            const res = await model.generateContent(`Para cocinar ${plato}, ¿qué ingredientes me faltan si solo tengo: ${stock}?`);
            Swal.fire("Análisis", res.response.text(), "info");
        } catch(e) { Swal.fire("Error", "IA ocupada", "error"); }
        hideLoading();
    };

    // --- ESCÁNER ---
    window.startScan = async function () {
        const container = document.getElementById("video-container");
        container.style.display = "block";
        const { BrowserMultiFormatReader } = await import("https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm");
        const reader = new BrowserMultiFormatReader();
        const video = document.createElement("video");
        video.setAttribute('playsinline', true); video.autoplay = true;
        container.innerHTML = ""; container.appendChild(video);
        const controls = await reader.decodeFromVideoDevice(undefined, video, (result) => {
            if (result) {
                document.getElementById("upc").value = result.text;
                controls.stop(); container.style.display = "none";
            }
        });
    };

    // --- CRUD ---
    window.saveItem = async () => {
        const upc = document.getElementById("upc").value;
        if(!upc) return;
        await setDoc(doc(db, "families", familyId, "inventory", upc), {
            name: document.getElementById("product").value,
            qty: parseInt(document.getElementById("qty").value) || 0,
            category: document.getElementById("category").value,
            expiry: document.getElementById("expiry").value,
            updatedAt: Date.now()
        }, { merge: true });
        Swal.fire("Listo", "Producto guardado", "success");
    };

    // --- UTILS ---
    function renderList() {
        const list = document.getElementById("inventory-list");
        list.innerHTML = "";
        inventoryData.forEach(item => {
            const div = document.createElement("div");
            div.className = `card ${item.qty <= 1 ? 'status-low' : 'status-ok'}`;
            div.innerHTML = `<b>${item.name}</b> - Stock: ${item.qty}<br><small>${item.category}</small>`;
            list.appendChild(div);
        });
    }

    function showLoading(m) { document.getElementById('loading-screen').style.display='flex'; document.getElementById('loading-msg').innerText=m; }
    function hideLoading() { document.getElementById('loading-screen').classList.add('fade'); setTimeout(()=>document.getElementById('loading-screen').style.display='none', 300); }
    window.toggleView = (v) => { document.getElementById('nav-inv').className = v==='inventory'?'active':''; renderList(); };

</script>
</body>
</html>
