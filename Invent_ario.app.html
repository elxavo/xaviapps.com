<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Velastegui Pantry Gold PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; 
            --warning: #f39c12; --success: #27ae60; --expired: #9b59b6;
            --bg: #f4f7f6; --text: #333; 
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .container { padding: 15px; max-width: 700px; margin: auto; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #ddd; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .google-btn { background: #db4437; color: white; margin-top: 10px; }

        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        .status-critical { border-left-color: var(--danger); }
        .status-expired { border-left-color: var(--expired); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); }
        .aisle-header { background: #eee; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin: 15px 0 5px 0; color: var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h3 style="text-align:center">PANTRY LOGIN</h3>
        <div id="auth-fields">
            <input id="user-name" type="text" placeholder="Tu Nombre (Solo Registro)">
            <input id="email" type="email" placeholder="Email">
            <input id="pass" type="password" placeholder="Password">
            <input id="family-code" type="text" placeholder="Código Familiar (Unirse)">
            <button onclick="handleAuth('login')">ENTRAR</button>
            <button onclick="handleAuth('register')" style="background:none; color:var(--accent); margin-top:5px;">REGISTRARSE</button>
            <hr>
            <button class="google-btn" onclick="loginGoogle()">CONTINUAR CON GOOGLE</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <header>
        <button onclick="logout()" style="width:auto; padding:5px; background:transparent; font-size:18px">⎋</button>
        <div id="family-display">CARGANDO...</div>
        <div style="width:30px"></div>
    </header>

    <div class="container">
        <div id="view-add" class="card">
            <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;">📷 ESCANEAR</button>
            <div id="video-container"></div>
            <input id="upc" type="text" placeholder="UPC" onchange="handleUPCChange(this.value)" style="margin-bottom:10px">
            <input id="product" type="text" placeholder="Nombre Producto" style="margin-bottom:10px">
            <div class="grid-3">
                <select id="category">
                    <option>PANTRY</option><option>FRIDGE</option><option>FREEZER</option>
                    <option>CLEANING</option><option>BREAD</option><option>DRINKS</option>
                </select>
                <input id="expiry" type="date">
                <input id="qty" type="number" placeholder="Cant.">
            </div>
            <div class="grid-3" style="margin-top:10px">
                <input id="min" type="number" placeholder="Min">
                <input id="max" type="number" placeholder="Max">
                <button onclick="saveItem()" style="background:var(--success)">GARDAR</button>
            </div>
        </div>
        <div id="inventory-list"></div>
    </div>

    <nav>
        <div onclick="toggleView('inventory')" id="nav-inv" class="active">📦 STOCK</div>
        <div onclick="toggleView('shopping')" id="nav-shop">🛒 COMPRAS</div>
    </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, increment, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
    authDomain: "velastegui-pantry.firebaseapp.com",
    projectId: "velastegui-pantry",
    storageBucket: "velastegui-pantry.firebasestorage.app",
    messagingSenderId: "927651602097",
    appId: "1:927651602097:web:b243cfa8aff28886900c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let familyId = null;
let currentView = 'inventory';
let inventoryData = [];

// ================= AUTH =================
window.handleAuth = async (type) => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    const name = document.getElementById('user-name').value;
    const fCode = document.getElementById('family-code').value.trim().toUpperCase();

    try {
        if (type === 'login') {
            await signInWithEmailAndPassword(auth, email, pass);
        } else {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(res.user, { displayName: name });
            const finalFid = fCode || Math.random().toString(36).substring(7).toUpperCase();
            await setDoc(doc(db, "users", res.user.uid), { familyId: finalFid });
        }
    } catch (e) { Swal.fire('Error', e.message, 'error'); }
};

window.loginGoogle = async () => {
    try {
        const res = await signInWithPopup(auth, provider);
        const uDoc = await getDoc(doc(db, "users", res.user.uid));
        if (!uDoc.exists()) {
            const finalFid = Math.random().toString(36).substring(7).toUpperCase();
            await setDoc(doc(db, "users", res.user.uid), { familyId: finalFid });
        }
    } catch (e) { console.error(e); }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const uDoc = await getDoc(doc(db, "users", user.uid));
        familyId = uDoc.data()?.familyId;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('family-display').innerText = `FAMILIA: ${familyId}`;
        onSnapshot(collection(db, "families", familyId, "inventory"), (snap) => {
            inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderList();
        });
    } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-app').classList.add('hidden');
    }
});

// ================= RENDER & AISLES =================
function renderList() {
    const listDiv = document.getElementById("inventory-list");
    listDiv.innerHTML = "";
    
    if (currentView === 'inventory') {
        inventoryData.forEach(item => {
            const card = document.createElement("div");
            card.className = `card ${item.qty <= item.min ? 'status-low' : 'status-ok'}`;
            card.innerHTML = `<b>${item.name}</b> [${item.qty}/${item.max}]<br><small>${item.category}</small>
                <div class="grid-3" style="margin-top:10px">
                    <button onclick="updateQty('${item.id}', 1)" style="background:var(--success)">+1</button>
                    <button onclick="updateQty('${item.id}', -1)" style="background:var(--warning)">-1</button>
                    <button onclick="deleteItem('${item.id}')" style="background:var(--danger)">X</button>
                </div>`;
            listDiv.appendChild(card);
        });
    } else {
        const categories = [...new Set(inventoryData.filter(i => i.qty < i.max).map(i => i.category))];
        categories.forEach(cat => {
            const h = document.createElement("div");
            h.className = "aisle-header"; h.innerText = `PASILLO: ${cat}`;
            listDiv.appendChild(h);
            inventoryData.filter(i => i.category === cat && i.qty < i.max).forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `<b>${item.name}</b> (Faltan: ${item.max - item.qty})
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <input type="number" id="buy_${item.id}" placeholder="Cant.">
                        <button onclick="processPurchase('${item.id}')">OK</button>
                    </div>`;
                listDiv.appendChild(card);
            });
        });
    }
}

window.updateQty = (id, v) => updateDoc(doc(db, "families", familyId, "inventory", id), { qty: increment(v) });
window.deleteItem = (id) => deleteDoc(doc(db, "families", familyId, "inventory", id));
window.processPurchase = (id) => {
    const v = parseInt(document.getElementById(`buy_${id}`).value);
    if (v > 0) updateDoc(doc(db, "families", familyId, "inventory", id), { qty: increment(v) });
};
window.toggleView = (v) => {
    currentView = v;
    document.getElementById('nav-inv').className = v === 'inventory' ? 'active' : '';
    document.getElementById('nav-shop').className = v === 'shopping' ? 'active' : '';
    renderList();
};
window.saveItem = async () => {
    const upc = document.getElementById("upc").value;
    await setDoc(doc(db, "families", familyId, "inventory", upc), {
        name: document.getElementById("product").value,
        category: document.getElementById("category").value,
        expiry: document.getElementById("expiry").value,
        qty: +document.getElementById("qty").value,
        min: +document.getElementById("min").value,
        max: +document.getElementById("max").value
    }, { merge: true });
};
</script>
</body>
</html>
