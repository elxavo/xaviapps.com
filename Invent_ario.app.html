<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Velastegui Pantry Gold PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --warning: #f39c12; --success: #27ae60; --expired: #9b59b6; --bg: #f4f7f6; --text: #333; }
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 15px; font-weight: bold; font-size: 1.2em; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 700px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; width: 100%; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #ddd; }
        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        .status-critical { border-left-color: var(--danger); }
        .status-expired { border-left-color: var(--expired); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); background: #f9f9f9; }
        #video-container { width: 100%; display: none; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        video { width: 100%; height: auto; }
        .section-title { margin-top: 25px; padding-bottom: 5px; font-size: 14px; font-weight: bold; border-bottom: 2px solid; }
        footer { text-align: center; padding: 20px; font-size: 12px; color: #777; margin-bottom: 80px; }
	<link rel="icon" href="data:,">
	.container {
    	display: flex;
    	flex-direction: column;
}
    </style>
</head>
<body>

<header>
    <span data-es="ASISTENTE DE COMPRAS" data-en="SHOPPER ASSISTANT">ASISTENTE DE COMPRAS</span>
    <button onclick="toggleLanguage()" style="width: auto; padding: 5px 10px; font-size: 12px; background: var(--accent);">EN/ES</button>
</header>
<div id="stats-bar" class="card" style="display:flex; justify-content: space-around; background: var(--primary); color: white; padding: 10px; margin-bottom: 10px;">
    <div style="text-align:center;">
        <small data-es="BAJO STOCK" data-en="LOW STOCK">BAJO STOCK</small>
        <div id="total-low" style="font-size: 20px; font-weight: bold; color: var(--warning);">0</div>
    </div>
</div>
<div class="container" id="main-container">
    <div id="view-add" class="card">
        <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;" data-es="📷 ESCANEAR CÓDIGO" data-en="📷 SCAN BARCODE">📷 ESCANEAR CÓDIGO</button>
        <div id="video-container"></div>
        <div class="form-group">
            <label data-es="Código UPC / Barcode" data-en="UPC Code / Barcode">Código UPC / Barcode</label>
            <input id="upc" type="text" placeholder="..." onchange="handleUPCChange(this.value)" />
        </div>
        <div class="form-group">
            <label data-es="Nombre del Producto" data-en="Product Name">Nombre del Producto</label>
            <input id="product" type="text" />
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label data-es="Categoría" data-en="Category">Categoría</label>
                <select id="category"></select>
            </div>
            <div class="form-group">
                <label data-es="Vencimiento" data-en="Expiration">Vencimiento</label>
                <input id="expiry" type="date" />
            </div>
            <div class="form-group">
                <label data-es="Stock Actual" data-en="Current Stock">Stock Actual</label>
                <input id="qty" type="number" value="0" />
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label data-es="Mínimo" data-en="Min">Mínimo</label><input id="min" type="number" placeholder="0" /></div>
	    <div class="form-group"><label data-es="Máximo" data-en="Max">Máximo</label><input id="max" type="number" placeholder="0" /></div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <button onclick="saveItem()" style="background:var(--success); height:45px; margin:0;" data-es="GUARDAR" data-en="SAVE">GUARDAR</button>
            </div>
        </div>
    </div>

    <div id="list-wrapper" style="width: 100%;">
        <h3 id="list-title" data-es="Inventario en Mano" data-en="Stock on Hand">Inventario en Mano</h3>
        <div id="inventory-list"></div>
    </div>
</div>
<div id="chef-section" class="card" style="margin-top:20px; background: #fffde7; border: 1px solid #fbc02d;">
    <h3 style="color: #f57f17; display: flex; align-items: center; gap: 10px;">
        👨‍🍳 Chef Xavier <small style="font-size: 0.5em; background: #fbc02d; padding: 2px 5px; border-radius: 5px;">PRO</small>
    </h3>
    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <input type="text" id="chef-prompt" placeholder="¿Qué tipo de comida se te antoja? (Ej: Ecuatoriana)" style="flex: 2;">
        <button onclick="askChefSuggestion()" style="background: #f57f17; flex: 1;">Sugerir</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="recipe-request" placeholder="¿Qué deseas preparar exactamente?" style="flex: 2;">
        <button onclick="getSpecificRecipe()" style="background: #ef6c00; flex: 1;">Receta y Faltantes</button>
    </div>
    <div id="chef-response" style="margin-top: 15px; font-size: 0.9em; line-height: 1.4; color: #333; max-height: 300px; overflow-y: auto;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, increment, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
    authDomain: "velastegui-pantry.firebaseapp.com",
    projectId: "velastegui-pantry",
    storageBucket: "velastegui-pantry.firebasestorage.app",
    messagingSenderId: "927651602097",
    appId: "1:927651602097:web:b243cfa8aff28886900c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "inventory");

/* ================= ESTADO ================= */
let currentView = 'inventory';
let inventoryData = [];
let currentLang = 'ES';

/* ================= GEMINI ================= */
// ⚠️ RECOMENDACIÓN: mover esto a backend en producción
const GEMINI_API_KEY = "AIzaSyC2zd_Qym9eXV6L168rZCdLmk6JPxFHAsY";

const GEMINI_FLASH = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

/* ================= DICCIONARIO ================= */
const dictionary = {
    ES: {
        inventoryTitle: "Inventario en Mano",
        shoppingTitle: "Lista de Compras",
        categories: ["-- SELECCIONAR --", "FRUTAS/VERDURAS", "CARNES/DELI", "LACTEOS/HUEVOS", "CONGELADOS", "DESPENSA/ABARROTES", "HARINAS/REPOSTERIA", "LIMPIEZA/CUIDADO", "OTROS"],
        errCategory: "Por favor, selecciona una categoría válida",
        shopSections: ["🚨 PRIORIDAD: CADUCIDAD", "⚠️ BAJO STOCK", "🔵 OPCIONAL"],
        buyBtn: "INGRESAR", vence: "Vence", faltan: "Faltan", buyPh: "Cant.",
        errMinMax: "El stock MÁXIMO debe ser mayor al MÍNIMO",
        errFields: "Faltan campos obligatorios"
    },
    EN: {
        inventoryTitle: "Stock on Hand",
        shoppingTitle: "Shopping List",
        categories: ["-- SELECT --", "PRODUCE", "MEAT/DELI", "DAIRY/EGGS", "FROZEN", "PANTRY/GROCERY", "BAKING/SPICES", "HOUSEHOLD", "OTHER"],
        errCategory: "Please select a valid category",
        shopSections: ["🚨 PRIORITY: EXPIRY", "⚠️ LOW STOCK", "🔵 OPTIONAL"],
        buyBtn: "ADD STOCK", vence: "Expires", faltan: "Needs", buyPh: "Qty",
        errMinMax: "MAX stock must be greater than MIN",
        errFields: "Missing required fields"
    }
};

/* ================= UTIL ================= */
function getInventoryContext() {
    return inventoryData.map(i => `${i.name} (${i.qty})`).join(", ");
}

function safeText(data) {
    const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!txt) throw new Error("Respuesta vacía del modelo");
    return txt;
}

/* ================= UI ================= */
window.resetForm = () => {
    // Lista completa de IDs incluyendo min y max
    ['upc','product','qty','expiry','min','max'].forEach(id => {
        document.getElementById(id).value = ""; 
    });
    // Reiniciar el selector de categoría
    const catSelect = document.getElementById("category");
    if(catSelect) catSelect.selectedIndex = 0;
};

window.toggleLanguage = () => {
    currentLang = currentLang === 'ES' ? 'EN' : 'ES';
    document.querySelectorAll('[data-es]').forEach(el => {
        el.innerText = currentLang === 'ES' ? el.dataset.es : el.dataset.en;
    });
    const cat = document.getElementById('category');
    const val = cat.value;
    cat.innerHTML = dictionary[currentLang].categories.map(c => `<option>${c}</option>`).join('');
    cat.value = val;
    toggleView(currentView);
};

window.toggleView = (view) => {
    currentView = view;
    const dict = dictionary[currentLang];
    const listWrapper = document.getElementById('list-wrapper');
    const formCard = document.getElementById('view-add');

    // Cambiar el título
    document.getElementById('list-title').innerText = view === 'inventory' ? dict.inventoryTitle : dict.shoppingTitle;

    if (view === 'shopping') {
        // En modo Compras: La lista va arriba (order 1) y el formulario abajo (order 2)
        listWrapper.style.order = "1";
        formCard.style.order = "2";
        // Opcional: Ocultar el formulario en modo compras para más espacio
        // formCard.style.display = "none"; 
    } else {
        // En modo Inventario: El formulario arriba (order 1) y la lista abajo (order 2)
        formCard.style.order = "1";
        listWrapper.style.order = "2";
        formCard.style.display = "block";
    }

    renderList();
};

/* ================= INVENTARIO ================= */
window.saveItem = async () => {
    const dict = dictionary[currentLang];

    // Captura de datos
    let upc = document.getElementById('upc').value.trim();
    const name = document.getElementById('product').value.trim();
    const category = document.getElementById("category").value;
    const qtyInput = document.getElementById('qty').value;
    const expiry = document.getElementById('expiry').value || null;
    const min = Number(document.getElementById('min').value);
    const max = Number(document.getElementById('max').value);

    // 1. Validaciones de campos obligatorios básicos
    if (!name) return Swal.fire({ icon: 'error', title: 'Nombre Requerido' });
    if (category.includes("--")) return Swal.fire({ icon: 'error', title: 'Categoría Requerida' });
    if (qtyInput === "") return Swal.fire({ icon: 'error', title: 'Stock Requerido' });
    if (max <= min) return Swal.fire({ icon: 'warning', text: dict.errMinMax });

// 2. Lógica de UPC Estandarizado (6, 12, 13 dígitos)
const isStandardUPC = /^\d{6}$|^\d{7}$|^\d{8}$|^\d{12}$|^\d{13}$/.test(upc);

if (!upc || !isStandardUPC) {
    let mensaje = !upc 
        ? "No has ingresado un código." 
        : "El código ingresado no tiene un formato estándar.";

    const confirm = await Swal.fire({
        title: '¿Generar código automático?',
        text: mensaje + " Se creará un ID de sistema para este producto.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Generar y Guardar',
        cancelButtonText: 'Corregir UPC'
    });

    if (confirm.isConfirmed) {
        // Overwrite con estándar interno de XaviApps
        upc = "XAVI-" + Date.now(); 
    } else {
        return; // Detener para que el usuario corrija el UPC
    }
}

    const data = {
        upc: upc,
        name: name,
        category: category,
        expiry: expiry,
        qty: Number(qtyInput),
        min: min,
        max: max,
        updatedAt: Date.now()
    };

    try {
        await setDoc(doc(db, "inventory", data.upc), data, { merge: true });
        resetForm();
        Swal.fire({ icon: 'success', title: 'Guardado', timer: 800, showConfirmButton: false });
    } catch (error) {
        console.error("Error Firebase:", error);
    }
};

window.updateQtyDirect = async (id, val) => {
    const num = Number(val);
    if (!isNaN(num) && num >= 0) {
        await updateDoc(doc(db,"inventory",id), { qty:num, updatedAt:Date.now() });
    }
};

window.processPurchase = async (id) => {
    const val = parseInt(document.getElementById(`buy_${id}`).value);
    if (!isNaN(val) && val > 0) {
        await updateDoc(doc(db,"inventory",id), { qty:increment(val), updatedAt:Date.now() });
    }
};

window.deleteItem = async (id) => {
    const res = await Swal.fire({ title:'¿Eliminar?', showCancelButton:true });
    if (res.isConfirmed) await deleteDoc(doc(db,"inventory",id));
};
window.handleUPCChange = async (upc) => {
    if (!upc) return;

    // 1. BUSCAR EN FIREBASE (Tu Inventario)
    try {
        const docRef = doc(db, "inventory", upc);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            // Llenar el formulario con tus datos guardados
            document.getElementById('product').value = data.name || "";
            document.getElementById('category').value = data.category || "";
            document.getElementById('qty').value = data.qty || 0;
            document.getElementById('min').value = data.min || 0;
            document.getElementById('max').value = data.max || 0;
            document.getElementById('expiry').value = data.expiry || "";
            
            Swal.fire({ icon: 'info', title: 'Producto en Inventario', timer: 1000, showConfirmButton: false });
            return; // Detener búsqueda si ya lo tenemos
        }
    } catch (err) {
        console.error("Error buscando en Firebase:", err);
    }

    // 2. BUSCAR EN OPEN FOOD FACTS (Si no está en Firebase)
    try {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${upc}.json`);
        const data = await res.json();

        if (data.status === 1) {
            const prod = data.product;
            document.getElementById('product').value = prod.product_name || prod.product_name_es || "Producto Desconocido";
            
            // Intentar mapear categoría de OpenFood (opcional)
            if (prod.categories_tags && prod.categories_tags.length > 0) {
                console.log("Categoría sugerida:", prod.categories_tags[0]);
            }

            Swal.fire({ icon: 'success', title: 'Encontrado en Web', timer: 1000, showConfirmButton: false });
        } else {
            Swal.fire({ icon: 'warning', title: 'No encontrado', text: 'Ingresa los datos manualmente', timer: 1500 });
        }
    } catch (err) {
        console.error("Error buscando en OpenFoodFacts:", err);
    }
};

/* ================= RENDERIZADO DINÁMICO ================= */
function renderList() {
    const div = document.getElementById("inventory-list");
    const dict = dictionary[currentLang];
    div.innerHTML = "";

    let displayedData = [...inventoryData]; // Copia para no alterar el original

if (currentView === 'shopping') {
        // FILTRAR: El artículo se queda en la lista hasta que el stock sea igual o mayor al máximo
        displayedData = inventoryData.filter(item => 
            item.qty < item.max || (item.expiry && new Date(item.expiry) < new Date())
        );

        // ORDENAR: Primero los que tienen stock 0 o están vencidos, luego por prioridad de falta
        displayedData.sort((a, b) => {
            if (a.qty <= 0) return -1;
            return (a.qty / a.max) - (b.qty / b.max);
        }); 
    }

    displayedData.forEach(item => {
        const card = document.createElement("div");
        
        let statusClass = "status-ok";
        if (item.qty <= 0) statusClass = "status-critical";
        else if (item.qty <= item.min) statusClass = "status-low";
        if (item.expiry && new Date(item.expiry) < new Date()) statusClass = "status-expired";

        card.className = `card ${statusClass}`;
        card.style.position = "relative"; // Necesario para ubicar el "Faltan" arriba a la derecha

        // Cálculo de cuánto falta para llegar al máximo
        const faltantes = Math.max(0, item.max - item.qty);

        // Controles según la vista
        const actionControls = currentView === 'inventory' 
            ? `<div style="display:flex; align-items:center; gap:5px;">
                   <button onclick="updateQtyDirect('${item.id}', ${item.qty - 1})" style="width:30px; background:var(--danger); padding:5px;">-</button>
                   <input type="number" value="${item.qty}" onchange="updateQtyDirect('${item.id}', this.value)" style="width:50px; text-align:center; padding:5px; margin:0; border:1px solid #ccc;">
                   <button onclick="updateQtyDirect('${item.id}', ${item.qty + 1})" style="width:30px; background:var(--success); padding:5px;">+</button>
               </div>`
            : `<input type="number" id="buy_${item.id}" placeholder="${faltantes}" style="width:60px; margin-right:5px;">
               <button onclick="processPurchase('${item.id}')" style="width:auto; padding:8px; background:var(--success); font-size:12px;">${dict.buyBtn}</button>`;

        // Etiqueta "Faltan" solo visible en modo Shopping o si hay faltantes
        const faltanBadge = currentView === 'shopping' 
            ? `<span style="position:absolute; top:5px; right:10px; font-size:0.75em; font-weight:bold; color:var(--danger);">
                ${dict.faltan}: ${faltantes}
               </span>` 
            : "";

        card.innerHTML = `
            ${faltanBadge}
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b style="font-size:1.1em;">${item.name}</b><br>
                    <small style="color:#666;">${item.category} | ${dict.vence}: ${item.expiry || '--'}</small>
                </div>
                <div style="display:flex; align-items:center; gap:5px;">
                    ${actionControls}
                    <button onclick="deleteItem('${item.id}')" style="width:35px; background:#95a5a6; margin-left:5px;">🗑️</button>
                </div>
            </div>
        `;
        div.appendChild(card);
    });

    const lowCount = inventoryData.filter(i => i.qty <= i.min).length;
    document.getElementById('total-low').innerText = lowCount;
    
    document.getElementById('nav-inv').className = currentView === 'inventory' ? 'active' : '';
    document.getElementById('nav-shop').className = currentView === 'shopping' ? 'active' : '';
}

/* ================= EXPORTACIÓN LOCAL (OFFLINE-FIRST) ================= */
window.exportToCSV = () => {
    let csv = "UPC,Producto,Categoria,Cantidad,Minimo,Vencimiento\n";
    inventoryData.forEach(i => {
        csv += `${i.upc},${i.name},${i.category},${i.qty},${i.min},${i.expiry || ''}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', `Pantry_Export_${new Date().toLocaleDateString()}.csv`);
    a.click();
};

onSnapshot(col, snap => {
    inventoryData = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderList();
});

/* ================= CHEF AI ================= */

// 🔥 SUGERENCIAS (FLASH rápido)
window.askChefSuggestion = async () => {
    const promptUser = document.getElementById('chef-prompt').value.trim();
    if (!promptUser) return;

    const responseDiv = document.getElementById('chef-response');
    responseDiv.innerHTML = "👨‍🍳 Analizando stock...";

    try {
        const res = await fetch(GEMINI_FLASH, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `Eres un chef práctico. Inventario: ${getInventoryContext()}. Sugiere 3 platos ${promptUser} en español.` }]
                }]
            })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "Error en API");

        responseDiv.innerHTML = safeText(data).replace(/\n/g, "<br>");
    } catch (e) {
        responseDiv.innerHTML = `<span style="color:red;">Error: ${e.message}</span>`;
    }
};

// Receta detallada usando el mismo modelo Flash para ahorrar tokens
window.getSpecificRecipe = async () => {
    const dish = document.getElementById('recipe-request').value.trim();
    if (!dish) return Swal.fire("¿Qué quieres cocinar?");

    const div = document.getElementById('chef-response');
    div.innerHTML = "👨‍🍳 Generando receta ...";

    try {
        const res = await fetch(GEMINI_FLASH, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `Chef experto. Inventario: ${getInventoryContext()}. Crea receta para: ${dish}. Incluye: 1. Pasos. 2. 🛒 NECESITAS COMPRAR (solo lo que no está en el inventario).` }]
                }]
            })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || "Error en API");

        div.innerHTML = safeText(data).replace(/\n/g, "<br>");
    } catch (e) {
        div.innerHTML = `<span style="color:red;">Error: ${e.message}</span>`;
    }
};
document.addEventListener('DOMContentLoaded', () => {
    // Inicializa las categorías según el idioma actual
    const cat = document.getElementById('category');
    cat.innerHTML = dictionary[currentLang].categories.map(c => `<option>${c}</option>`).join('');
    
    window.resetForm();
});

window.shareApp = () => {
    if (navigator.share) {
        navigator.share({
            title: 'Velastegui Shopper Assistant',
            text: 'Gestiona nuestro inventario de cocina aquí:',
            url: window.location.href
        });
    } else {
        Swal.fire("Enlace copiado", window.location.href, "success");
    }
};
