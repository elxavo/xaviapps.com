<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Family Pantry Gold PRO</title>
    
    <!-- Solución para el error de favicon y carga de SweetAlert -->
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; 
            --warning: #f39c12; --success: #27ae60; --expired: #9b59b6;
            --bg: #f4f7f6; --text: #333; 
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        header { 
            background: var(--primary); color: white; padding: 10px 15px; 
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .header-center { flex: 2; font-size: 14px; text-align: center; line-height: 1.2; text-transform: uppercase; }
        .header-btn {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 11px; padding: 8px 5px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; min-width: 55px;
        }
        
        .container { padding: 15px; max-width: 700px; margin: auto; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); background: #f9f9f9; }

        #video-container { width: 100%; display: none; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        video { width: 100%; height: auto; }

        #auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: white; border-radius: 14px; padding: 25px; width: 100%; max-width: 360px; }
        
        #loading-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: opacity 0.3s; }
        #loading-screen.fade { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="font-size:20px; font-weight:bold;">VELASTEGUI PANTRY</div>
    <div id="loading-msg" style="font-size:13px; opacity:0.6;">Cargando...</div>
</div>

<div id="auth-screen" style="display:none;">
    <div class="auth-box">
        <h2 style="text-align:center;">BIENVENIDO</h2>
        <input id="auth-email" type="email" placeholder="Tu Email" style="margin-bottom:10px;">
        <input id="auth-pass" type="password" placeholder="Contraseña" style="margin-bottom:10px;">
        <button onclick="doLogin()">INICIAR SESIÓN</button>
        <button onclick="doGoogleLogin()" style="background:#4285F4; margin-top:10px;">ENTRAR CON GOOGLE</button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <header>
        <div class="header-center">VELASTEGUI PANTRY<br><small id="user-display">---</small></div>
        <button class="header-btn" onclick="doLogout()" style="background:rgba(231,76,60,0.3);">SALIR</button>
    </header>

    <div class="container">
        <!-- BOTONES DE IA -->
        <div class="grid-3" style="margin-bottom: 15px;">
            <button onclick="sugerenciaChefIA()" style="background: #6c5ce7; font-size:12px;">👨‍🍳 CHEF IA</button>
            <button style="background: #00b894; font-size:12px;">🔍 RECETAS</button>
            <button style="background: #f39c12; font-size:12px;">📊 ANALISIS</button>
        </div>

        <!-- FORMULARIO DE AGREGAR -->
        <div id="view-add" class="card">
            <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;">📷 ESCANEAR CÓDIGO</button>
            <div id="video-container"></div>
            
            <label>Producto</label>
            <input id="upc" type="text" placeholder="Barcode" style="margin-bottom:10px;">
            <input id="product" type="text" placeholder="Nombre" style="margin-bottom:10px;">
            
            <div class="grid-3">
                <select id="category">
                    <option>PANTRY</option><option>DAIRY</option><option>FROZEN</option>
                    <option>MEAT</option><option>PRODUCE</option><option>CLEANING</option>
                </select>
                <input id="expiry" type="date">
                <input id="qty" type="number" placeholder="Cant">
            </div>
            <button onclick="saveItem()" style="background:var(--success); margin-top:15px;">GUARDAR</button>
        </div>

        <h3>Inventario</h3>
        <div id="inventory-list"></div>
    </div>
</div>

<nav>
    <div onclick="toggleView('inventory')" id="nav-inv" class="active">📦 STOCK</div>
    <div onclick="toggleView('shopping')" id="nav-shop">🛒 COMPRAS</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const firebaseConfig = {
        apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
        authDomain: "velastegui-pantry.firebaseapp.com",
        projectId: "velastegui-pantry",
        storageBucket: "velastegui-pantry.firebasestorage.app",
        messagingSenderId: "927651602097",
        appId: "1:927651602097:web:b243cfa8aff28886900c90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const genAI = new GoogleGenerativeAI("AIzaSyCxMRqavNSSeRNfVk7UayR-llE_71R4NNI");
    const aiModel = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    let inventoryData = [], familyId = "DEFAULT";

    // --- FUNCIONES GLOBALES (Asignadas a window para que los onclick funcionen) ---
    
    window.doLogin = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            Swal.fire("Error", "No se pudo iniciar sesión", "error");
        }
    };

    window.doGoogleLogin = async () => {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
        } catch (e) {
            Swal.fire("Error", "Error con Google Login", "error");
        }
    };

    window.doLogout = () => signOut(auth);

    window.saveItem = async () => {
        const upc = document.getElementById("upc").value;
        if(!upc) return Swal.fire("Atención", "Pon el código de barras", "warning");
        
        showLoading("Guardando...");
        try {
            await setDoc(doc(db, "families", familyId, "inventory", upc), {
                name: document.getElementById("product").value,
                qty: parseInt(document.getElementById("qty").value) || 0,
                category: document.getElementById("category").value,
                expiry: document.getElementById("expiry").value,
                updatedAt: Date.now()
            }, { merge: true });
            Swal.fire("Éxito", "Producto guardado", "success");
        } catch (e) {
            Swal.fire("Error", "Error al guardar", "error");
        } finally {
            hideLoading();
        }
    };

    window.startScan = async function () {
        const container = document.getElementById("video-container");
        container.style.display = "block";
        try {
            const { BrowserMultiFormatReader } = await import("https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm");
            const reader = new BrowserMultiFormatReader();
            const video = document.createElement("video");
            video.setAttribute('playsinline', true);
            video.autoplay = true;
            container.innerHTML = ""; 
            container.appendChild(video);
            
            const controls = await reader.decodeFromVideoDevice(undefined, video, (result) => {
                if (result) {
                    document.getElementById("upc").value = result.text;
                    controls.stop(); 
                    container.style.display = "none";
                }
            });
        } catch (e) {
            Swal.fire("Cámara", "No se pudo activar la cámara", "error");
        }
    };

    window.sugerenciaChefIA = async () => {
        const stock = inventoryData.filter(i => i.qty > 0).map(i => i.name).join(", ");
        if(!stock) return Swal.fire("Info", "No tienes productos en stock", "info");
        
        showLoading("Generando receta...");
        try {
            const result = await aiModel.generateContent(`Tengo estos productos: ${stock}. Dame una receta latina creativa.`);
            const text = await result.response.text();
            Swal.fire({ title: 'Sugerencia Chef IA', html: `<div style="text-align:left;">${text.replace(/\n/g, '<br>')}</div>` });
        } catch(e) {
            Swal.fire("IA", "Hubo un problema con la IA", "error");
        } finally {
            hideLoading();
        }
    };

    window.toggleView = (v) => {
        document.getElementById('nav-inv').className = v === 'inventory' ? 'active' : '';
        renderList();
    };

    // --- MANEJO DE ESTADO DE AUTENTICACIÓN ---
    onAuthStateChanged(auth, async (user) => {
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        if (user) {
            document.getElementById('user-display').innerText = user.email;
            authScreen.style.display = 'none';
            mainApp.style.display = 'block';
            
            onSnapshot(collection(db, "families", familyId, "inventory"), (snap) => {
                inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList();
            });
        } else {
            authScreen.style.display = 'flex';
            mainApp.style.display = 'none';
        }
        hideLoading();
    });

    function renderList() {
        const list = document.getElementById("inventory-list");
        list.innerHTML = "";
        inventoryData.forEach(item => {
            const div = document.createElement("div");
            div.className = `card ${item.qty <= 1 ? 'status-low' : 'status-ok'}`;
            div.innerHTML = `<b>${item.name}</b> - Stock: ${item.qty}<br><small>${item.category} | Exp: ${item.expiry || 'N/A'}</small>`;
            list.appendChild(div);
        });
    }

    function showLoading(m) { 
        const ls = document.getElementById('loading-screen');
        ls.style.display='flex'; 
        ls.classList.remove('fade');
        document.getElementById('loading-msg').innerText=m; 
    }
    function hideLoading() { 
        const ls = document.getElementById('loading-screen');
        if(ls) { 
            ls.classList.add('fade'); 
            setTimeout(()=>ls.style.display='none', 300); 
        }
    }
</script>
</body>
</html>
