<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Family Pantry Gold PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; --bg: #f4f7f6; }
        body { margin:0; font-family: sans-serif; background: var(--bg); padding-bottom: 80px; }
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; color: white; border: none; }
        .btn-chef { background: #6c5ce7; }
        .btn-scan { background: #8e44ad; margin-bottom: 15px; }
        .btn-save { background: var(--success); margin-top: 15px; }
        .btn-nav { flex: 1; padding: 20px; background: white; color: #95a5a6; border-top: 3px solid transparent; }
        .btn-nav.active { color: var(--accent); border-top: 3px solid var(--accent); }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ddd; }
        #video-container { width: 100%; display: none; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        video { width: 100%; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <div><strong>VELASTEGUI PANTRY</strong><br><small id="user-email">...</small></div>
    <button onclick="doLogout()" style="width:auto; background:rgba(255,255,255,0.2); padding:5px 15px;">SALIR</button>
</header>

<div class="container">
    <!-- Botones Superiores -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">
        <button class="btn-chef" onclick="sugerenciaChefIA()">👨‍🍳 CHEF IA</button>
        <button style="background: #00b894;">🔍 RECETAS</button>
        <button style="background: #f39c12;">📊 ANALISIS</button>
    </div>

    <!-- Formulario Principal -->
    <div id="view-add" class="card">
        <button class="btn-scan" onclick="startScan()">📷 ESCANEAR CÓDIGO</button>
        <div id="video-container"></div>

        <label><small>UPC / PRODUCTO</small></label>
        <input id="upc" type="text" placeholder="Código de barras" onchange="handleUPCChange(this.value)" style="margin-bottom:10px;">
        <input id="product" type="text" placeholder="Nombre del producto">

        <div class="grid-form">
            <select id="category">
                <option>PANTRY</option>
                <option>MEAT</option>
                <option>DAIRY</option>
                <option>FROZEN</option>
                <option>CLEANING</option>
            </select>
            <input id="expiry" type="date">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px;">
            <div><label><small>CANT</small></label><input id="qty" type="number" value="0"></div>
            <div><label><small>MIN</small></label><input id="min" type="number" value="1"></div>
            <div><label><small>MAX</small></label><input id="max" type="number" value="10"></div>
        </div>

        <button class="btn-save" onclick="saveItem()">GUARDAR</button>
    </div>

    <h3 id="list-title">Inventario</h3>
    <div id="inventory-list"></div>
</div>

<nav>
    <button id="nav-inv" class="btn-nav active" onclick="toggleView('inventory')">📦 STOCK</button>
    <button id="nav-shop" class="btn-nav" onclick="toggleView('shopping')">🛒 COMPRAS</button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

const firebaseConfig = {
    apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
    authDomain: "velastegui-pantry.firebaseapp.com",
    projectId: "velastegui-pantry",
    storageBucket: "velastegui-pantry.firebasestorage.app",
    messagingSenderId: "927651602097",
    appId: "1:927651602097:web:b243cfa8aff28886900c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const genAI = new GoogleGenerativeAI("AIzaSyCxMRqavNSSeRNfVk7UayR-llE_71R4NNI");
const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

let inventoryData = [];
let familyId = null;
let currentView = 'inventory';

onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById('user-email').innerText = user.email;
        // Obtenemos el familyId del perfil del usuario
        const userDoc = await getDoc(doc(db, "users", user.uid));
        familyId = userDoc.exists() ? userDoc.data().familyId : "DEFAULT";
        
        onSnapshot(collection(db, "families", familyId, "inventory"), (snap) => {
            inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderList();
        });
    } else {
        window.location.href = "login.html"; // Redirigir si no hay sesión
    }
});

window.saveItem = async () => {
    const upc = document.getElementById("upc").value;
    const name = document.getElementById("product").value;
    if (!upc || !name) return Swal.fire("Error", "Faltan datos", "error");

    await setDoc(doc(db, "families", familyId, "inventory", upc), {
        name,
        category: document.getElementById("category").value,
        expiry: document.getElementById("expiry").value,
        qty: Number(document.getElementById("qty").value),
        min: Number(document.getElementById("min").value),
        max: Number(document.getElementById("max").value),
        updatedAt: Date.now()
    }, { merge: true });
    
    Swal.fire("Guardado", "", "success");
    resetForm();
};

window.toggleView = (view) => {
    currentView = view;
    document.getElementById('nav-inv').classList.toggle('active', view === 'inventory');
    document.getElementById('nav-shop').classList.toggle('active', view === 'shopping');
    document.getElementById('list-title').innerText = view === 'inventory' ? "Inventario" : "Lista de Compras";
    renderList();
};

function renderList() {
    const list = document.getElementById("inventory-list");
    list.innerHTML = "";
    
    if (currentView === 'inventory') {
        inventoryData.forEach(item => {
            const div = document.createElement("div");
            div.className = "card item-row";
            div.innerHTML = `
                <div><strong>${item.name}</strong><br><small>${item.qty} de ${item.max}</small></div>
                <div style="display:flex; gap:5px;">
                    <button onclick="updateQty('${item.id}', 1)" style="background:var(--success); width:40px;">+</button>
                    <button onclick="updateQty('${item.id}', -1)" style="background:var(--danger); width:40px;">-</button>
                </div>
            `;
            list.appendChild(div);
        });
    } else {
        const faltantes = inventoryData.filter(i => i.qty <= i.min);
        faltantes.forEach(item => {
            const div = document.createElement("div");
            div.className = "card item-row";
            div.style.borderLeft = "5px solid var(--danger)";
            div.innerHTML = `
                <div><strong>${item.name}</strong><br><small>Faltan: ${item.max - item.qty}</small></div>
                <button onclick="updateQty('${item.id}', ${item.max - item.qty})" style="background:var(--accent); width:auto;">COMPRADO</button>
            `;
            list.appendChild(div);
        });
    }
}

window.updateQty = async (id, val) => {
    await updateDoc(doc(db, "families", familyId, "inventory", id), { qty: increment(val) });
};

window.sugerenciaChefIA = async () => {
    const ingredientes = inventoryData.filter(i => i.qty > 0).map(i => i.name).join(", ");
    if (!ingredientes) return Swal.fire("Vacio", "No hay ingredientes", "info");
    
    Swal.fire({ title: "Cocinando...", didOpen: () => Swal.showLoading() });
    const result = await model.generateContent("Dame una receta rápida con: " + ingredientes);
    Swal.fire("Sugerencia del Chef", result.response.text(), "info");
};

window.startScan = async () => {
    const container = document.getElementById("video-container");
    container.style.display = "block";
    const { BrowserMultiFormatReader } = await import("https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm");
    const reader = new BrowserMultiFormatReader();
    const video = document.createElement("video");
    container.innerHTML = ""; container.appendChild(video);
    
    const controls = await reader.decodeFromVideoDevice(undefined, video, (res) => {
        if (res) {
            document.getElementById("upc").value = res.text;
            controls.stop(); container.style.display = "none";
            handleUPCChange(res.text);
        }
    });
};

function resetForm() {
    ["upc", "product", "qty", "expiry"].forEach(id => document.getElementById(id).value = "");
}

window.doLogout = () => signOut(auth);
</script>
</body>
</html>
