<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Velastegui Pantry Gold PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --warning: #f39c12; --success: #27ae60; --expired: #9b59b6; --bg: #f4f7f6; --text: #333; }
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { background: var(--primary); color: white; padding: 15px; font-weight: bold; font-size: 1.2em; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 700px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; width: 100%; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #ddd; }
        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        .status-critical { border-left-color: var(--danger); }
        .status-expired { border-left-color: var(--expired); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #777; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); background: #f9f9f9; }
        #video-container { width: 100%; display: none; background: #000; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        video { width: 100%; height: auto; }
        .section-title { margin-top: 25px; padding-bottom: 5px; font-size: 14px; font-weight: bold; border-bottom: 2px solid; }
        footer { text-align: center; padding: 20px; font-size: 12px; color: #777; margin-bottom: 80px; }
	<link rel="icon" href="data:,">
    </style>
</head>
<body>

<header>
    <span data-es="ASISTENTE DE COMPRAS" data-en="SHOPPER ASSISTANT">ASISTENTE DE COMPRAS</span>
    <button onclick="toggleLanguage()" style="width: auto; padding: 5px 10px; font-size: 12px; background: var(--accent);">EN/ES</button>
</header>
<div id="stats-bar" class="card" style="display:flex; justify-content: space-around; background: var(--primary); color: white; padding: 10px; margin-bottom: 10px;">
    <div style="text-align:center;">
        <small data-es="BAJO STOCK" data-en="LOW STOCK">BAJO STOCK</small>
        <div id="total-low" style="font-size: 20px; font-weight: bold; color: var(--warning);">0</div>
    </div>
</div>
<div class="container" id="main-container">
    <div id="view-add" class="card">
        <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;" data-es="📷 ESCANEAR CÓDIGO" data-en="📷 SCAN BARCODE">📷 ESCANEAR CÓDIGO</button>
        <div id="video-container"></div>
        <div class="form-group">
            <label data-es="Código UPC / Barcode" data-en="UPC Code / Barcode">Código UPC / Barcode</label>
            <input id="upc" type="text" placeholder="..." onchange="handleUPCChange(this.value)" />
        </div>
        <div class="form-group">
            <label data-es="Nombre del Producto" data-en="Product Name">Nombre del Producto</label>
            <input id="product" type="text" />
        </div>
        <div class="grid-3">
            <div class="form-group">
                <label data-es="Categoría" data-en="Category">Categoría</label>
                <select id="category"></select>
            </div>
            <div class="form-group">
                <label data-es="Vencimiento" data-en="Expiration">Vencimiento</label>
                <input id="expiry" type="date" />
            </div>
            <div class="form-group">
                <label data-es="Stock Actual" data-en="Current Stock">Stock Actual</label>
                <input id="qty" type="number" value="0" />
            </div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label data-es="Mínimo" data-en="Min">Mínimo</label><input id="min" type="number" value="1" /></div>
            <div class="form-group"><label data-es="Máximo" data-en="Max">Máximo</label><input id="max" type="number" value="10" /></div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <button onclick="saveItem()" style="background:var(--success); height:45px; margin:0;" data-es="GUARDAR" data-en="SAVE">GUARDAR</button>
            </div>
        </div>
    </div>

    <div id="list-wrapper" style="width: 100%;">
        <h3 id="list-title" data-es="Inventario en Mano" data-en="Stock on Hand">Inventario en Mano</h3>
        <div id="inventory-list"></div>
    </div>
</div>
<div id="chef-section" class="card" style="margin-top:20px; background: #fffde7; border: 1px solid #fbc02d;">
    <h3 style="color: #f57f17; display: flex; align-items: center; gap: 10px;">
        👨‍🍳 Chef AI <small style="font-size: 0.5em; background: #fbc02d; padding: 2px 5px; border-radius: 5px;">PRO</small>
    </h3>
    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <input type="text" id="chef-prompt" placeholder="¿Qué tipo de comida se te antoja? (Ej: Ecuatoriana)" style="flex: 2;">
        <button onclick="askChefSuggestion()" style="background: #f57f17; flex: 1;">Sugerir</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="recipe-request" placeholder="¿Qué deseas preparar exactamente?" style="flex: 2;">
        <button onclick="getSpecificRecipe()" style="background: #ef6c00; flex: 1;">Receta y Faltantes</button>
    </div>
    <div id="chef-response" style="margin-top: 15px; font-size: 0.9em; line-height: 1.4; color: #333; max-height: 300px; overflow-y: auto;"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, increment, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
    authDomain: "velastegui-pantry.firebaseapp.com",
    projectId: "velastegui-pantry",
    storageBucket: "velastegui-pantry.firebasestorage.app",
    messagingSenderId: "927651602097",
    appId: "1:927651602097:web:b243cfa8aff28886900c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "inventory");

let currentView = 'inventory';
let inventoryData = [];
let currentLang = 'ES';

const dictionary = {
    ES: {
        inventoryTitle: "Inventario en Mano",
        shoppingTitle: "Lista de Compras",
        categories: ["-- SELECCIONAR --", "FRUTAS/VERDURAS", "CARNES/DELI", "LACTEOS/HUEVOS", "CONGELADOS", "DESPENSA/ABARROTES", "HARINAS/REPOSTERIA", "LIMPIEZA/CUIDADO", "OTROS"],
        errCategory: "Por favor, selecciona una categoría válida",
        shopSections: ["🚨 PRIORIDAD: CADUCIDAD", "⚠️ BAJO STOCK", "🔵 OPCIONAL"],
        buyBtn: "INGRESAR", vence: "Vence", faltan: "Faltan", buyPh: "Cant.",
        errMinMax: "El stock MÁXIMO debe ser mayor al MÍNIMO",
        errFields: "Faltan campos obligatorios"
    },
    EN: {
        inventoryTitle: "Stock on Hand",
        shoppingTitle: "Shopping List",
        categories: ["-- SELECT --", "PRODUCE", "MEAT/DELI", "DAIRY/EGGS", "FROZEN", "PANTRY/GROCERY", "BAKING/SPICES", "HOUSEHOLD", "OTHER"],
        errCategory: "Please select a valid category",
        shopSections: ["🚨 PRIORITY: EXPIRY", "⚠️ LOW STOCK", "🔵 OPTIONAL"],
        buyBtn: "ADD STOCK", vence: "Expires", faltan: "Needs", buyPh: "Qty",
        errMinMax: "MAX stock must be greater than MIN",
        errFields: "Missing required fields"
    }
};

// --- UTILIDADES ---
window.resetForm = () => {
    const fields = ['upc', 'product', 'qty', 'expiry', 'min', 'max'];
    fields.forEach(id => { document.getElementById(id).value = ""; });
    document.getElementById("category").selectedIndex = 0;
};

// --- EXPORTAR FUNCIONES AL GLOBALES (WINDOW) ---

window.toggleLanguage = () => {
    currentLang = currentLang === 'ES' ? 'EN' : 'ES';
    document.querySelectorAll('[data-es]').forEach(el => {
        el.innerText = currentLang === 'ES' ? el.getAttribute('data-es') : el.getAttribute('data-en');
    });
    const catSelect = document.getElementById('category');
    const currentVal = catSelect.value;
    catSelect.innerHTML = dictionary[currentLang].categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    catSelect.value = currentVal;
    window.toggleView(currentView); 
};

window.toggleView = (view) => {
    currentView = view;
    const dict = dictionary[currentLang];
    document.getElementById('nav-inv').className = view === 'inventory' ? 'active' : '';
    document.getElementById('nav-shop').className = view === 'shopping' ? 'active' : '';
    document.getElementById('list-title').innerText = view === 'inventory' ? dict.inventoryTitle : dict.shoppingTitle;
    document.getElementById('main-container').style.flexDirection = view === 'inventory' ? 'column' : 'column-reverse';
    renderList();
};

window.handleUPCChange = async (code) => {
    if (!code) return;
    const docSnap = await getDoc(doc(db, "inventory", code));
    if (docSnap.exists()) window.fillForm(docSnap.data(), code);
    else {
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const data = await res.json();
            if (data.status === 1) document.getElementById("product").value = data.product.product_name || "";
        } catch (e) {}
    }
};

window.saveItem = async () => {
    const dict = dictionary[currentLang];
    
    // Referencias a elementos
    const upcEl = document.getElementById('upc');
    const catEl = document.getElementById("category");
    const nameEl = document.getElementById('product');
    const qtyEl = document.getElementById('qty');
    const minEl = document.getElementById('min');
    const maxEl = document.getElementById('max');

    const data = {
        upc: upcEl.value.trim(),
        name: nameEl.value.trim(),
        category: catEl.value,
        expiry: document.getElementById('expiry').value || null,
        qty: Number(qtyEl.value),
        min: Number(minEl.value),
        max: Number(maxEl.value)
    };

    // 1. VALIDACIÓN: CAMPOS BÁSICOS VACÍOS
    if (!data.name || qtyEl.value === "" || minEl.value === "" || maxEl.value === "") {
        Swal.fire({ icon: 'error', title: dict.errFields });
        return;
    }

    // 2. VALIDACIÓN: CATEGORÍA VÁLIDA
    if (catEl.selectedIndex === 0) {
        Swal.fire({ 
            icon: 'warning', 
            title: currentLang === 'ES' ? 'Categoría requerida' : 'Category required',
            text: dict.errCategory 
        });
        return;
    }

    // 3. VALIDACIÓN: ESTÁNDAR UPC (Si se proporciona uno)
    // Verifica que sean solo números y longitudes estándar (6, 12, 13)
    const upcRegex = /^\d+$/;
    if (data.upc && (!upcRegex.test(data.upc) || ![6, 12, 13].includes(data.upc.length))) {
        const proceed = await Swal.fire({
            title: currentLang === 'ES' ? 'UPC No Estándar' : 'Non-Standard UPC',
            text: currentLang === 'ES' 
                ? 'El código no parece un estándar UPC (6, 12 o 13 dígitos). ¿Deseas usarlo de todos modos?' 
                : 'The code does not look like a standard UPC. Use it anyway?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Sí, guardar',
            cancelButtonText: 'Corregir'
        });
        if (!proceed.isConfirmed) return;
    }

    // 4. VALIDACIÓN: LÓGICA DE STOCK (MIN < MAX)
    if (data.max <= data.min) {
        Swal.fire({ icon: 'warning', title: 'Atención', text: dict.errMinMax });
        return;
    }

    // 5. ASIGNACIÓN DE ID MANUAL (Si el UPC está vacío)
    if (!data.upc) {
        const confirmUPC = await Swal.fire({ 
            title: currentLang === 'ES' ? '¿Sin código de barras?' : 'No Barcode?',
            text: currentLang === 'ES' ? 'Se generará un código interno.' : 'An internal code will be generated.',
            icon: 'question', 
            showCancelButton: true 
        });
        if (!confirmUPC.isConfirmed) return;
        data.upc = "MANUAL_" + data.name.toUpperCase().replace(/\s+/g, '_') + "_" + Date.now();
    }

    // EJECUCIÓN DEL GUARDADO
    try {
        await setDoc(doc(db, "inventory", data.upc), {
            ...data, updatedAt: Date.now()
        }, { merge: true });
        
        window.resetForm();
        Swal.fire({ icon: 'success', title: 'OK', timer: 800, showConfirmButton: false });
    } catch (e) { 
        console.error("Error saving:", e);
        Swal.fire({ icon: 'error', title: 'Firebase Error' });
    }
};

window.updateQtyDirect = async (id, val) => { 
    if (val >= 0) await updateDoc(doc(db, "inventory", id), { qty: Number(val), updatedAt: Date.now() }); 
};

window.deleteItem = async (id) => {
    const result = await Swal.fire({ title: '¿Eliminar?', icon: 'warning', showCancelButton: true });
    if (result.isConfirmed) await deleteDoc(doc(db, "inventory", id));
};

window.processPurchase = async (id, current) => {
    const inputField = document.getElementById(`buy_${id}`);
    const val = parseInt(inputField.value);
    if (val > 0) {
        await updateDoc(doc(db, "inventory", id), { qty: increment(val), updatedAt: Date.now() });
        inputField.value = "";
    }
};

window.fillForm = (data, upc) => {
    document.getElementById("upc").value = upc; 
    document.getElementById("product").value = data.name;
    document.getElementById("category").value = data.category; 
    document.getElementById("expiry").value = data.expiry || "";
    document.getElementById("qty").value = data.qty; 
    document.getElementById("min").value = data.min; 
    document.getElementById("max").value = data.max;
};

// --- RENDERIZADO ---
function renderList() {
    const listDiv = document.getElementById("inventory-list");
    listDiv.innerHTML = "";
    let countLow = 0;
    const today = new Date();
    const nextWeek = new Date(); nextWeek.setDate(today.getDate() + 7);

    inventoryData.forEach(item => { if (item.qty <= item.min) countLow++; });
    document.getElementById("total-low").innerText = countLow;

    if (currentView === 'inventory') {
        inventoryData.sort((a,b) => (a.expiry || '9999').localeCompare(b.expiry || '9999')).forEach(item => {
            const isNear = item.expiry && new Date(item.expiry) <= nextWeek;
            let cls = item.qty <= item.min ? "status-low" : "status-ok";
            if (isNear) cls = "status-expired";

            const card = document.createElement("div");
            card.className = `card ${cls}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${item.name}</b>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input type="number" value="${item.qty}" onchange="updateQtyDirect('${item.id}', this.value)" style="width:50px; text-align:center;">
                        <button onclick="deleteItem('${item.id}')" style="background:var(--danger); width:30px;">X</button>
                    </div>
                </div>
                <small>${item.category} | ${dictionary[currentLang].vence}: ${item.expiry || 'N/A'}</small>
            `;
            listDiv.appendChild(card);
        });
    } else {
        const dict = dictionary[currentLang];
        const sections = [
            { title: dict.shopSections[0], items: inventoryData.filter(i => i.expiry && new Date(i.expiry) <= nextWeek), color: "#9b59b6" },
            { title: dict.shopSections[1], items: inventoryData.filter(i => i.qty <= i.min && !(i.expiry && new Date(i.expiry) <= nextWeek)), color: "#e67e22" },
            { title: dict.shopSections[2], items: inventoryData.filter(i => i.qty > i.min && i.qty < i.max && !(i.expiry && new Date(i.expiry) <= nextWeek)), color: "#3498db" }
        ];
        sections.forEach(sec => {
            if (sec.items.length === 0) return;
            const h = document.createElement("div"); h.className = "section-title"; h.style.color = sec.color; h.innerText = sec.title;
            listDiv.appendChild(h);
            sec.items.forEach(item => {
                const card = document.createElement("div"); card.className = "card";
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;"><b>${item.name}</b><small>${dict.faltan}: ${item.max - item.qty}</small></div>
                    <div style="margin-top:10px; display:flex; gap:8px;">
                        <input type="number" id="buy_${item.id}" placeholder="${dict.buyPh}" style="flex:1;">
                        <button onclick="processPurchase('${item.id}', ${item.qty})" style="background:${sec.color}; flex:1;">${dict.buyBtn}</button>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        });
    }
}

onSnapshot(col, (snap) => {
    inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
});

window.onload = () => {
    window.resetForm(); // Limpieza inicial obligatoria
    const catSelect = document.getElementById('category');
    catSelect.innerHTML = dictionary[currentLang].categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
};
// --- CONFIGURACIÓN CHEF AI (GEMINI) ---
const GEMINI_API_KEY = "AIzaSyCxMRqavNSSeRNfVk7UayR-llE_71R4NNI"; 
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
// Función auxiliar para obtener el texto del inventario actual
function getInventoryContext() {
    return inventoryData.map(i => `${i.name} (Cant: ${i.qty})`).join(", ");
}

// BOTÓN 1: Sugerencias basadas en stock
window.askChefSuggestion = async () => {
    const promptUser = document.getElementById('chef-prompt').value.trim();
    if (!promptUser) return;

    const responseDiv = document.getElementById('chef-response');
    responseDiv.innerHTML = "<i>👨‍🍳 Analizando tu stock de Velastegui Pantry...</i>";

    // Simplificamos el inventario para la IA
    const context = inventoryData.map(i => `${i.name}: ${i.qty}`).join(", ");

    try {
        const response = await fetch(GEMINI_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [{
                    role: "user", // Agregamos el rol para mayor claridad
                    parts: [{
                        text: `Contexto de inventario: ${context}. Sugiere 3 platos de comida ${promptUser}. Responde en español.`
                    }]
                }]
            })
        });

        const data = await response.json();

        // Si hay un error 400, aquí veremos el porqué exacto
        if (!response.ok) {
            console.error("Detalle del Error 400:", data);
            throw new Error(data.error.message || "Error en el formato de la petición");
        }

        const chefText = data.candidates[0].content.parts[0].text;
        responseDiv.innerHTML = `<b>Sugerencias:</b><br>${chefText.replace(/\n/g, '<br>')}`;

    } catch (e) {
        console.error("Error capturado:", e);
        responseDiv.innerHTML = `<span style="color:red;">Error: ${e.message}</span>`;
    }
};
// BOTÓN 2: Receta detallada y faltantes
window.getSpecificRecipe = async () => {
    const dish = document.getElementById('recipe-request').value.trim();
    if (!dish) return Swal.fire("¿Qué quieres cocinar?");

    const responseDiv = document.getElementById('chef-response');
    responseDiv.innerHTML = "<i>Revisando ingredientes y redactando receta...</i>";

    const systemPrompt = `Soy un asistente de cocina. El usuario quiere preparar: ${dish}.
    Inventario disponible: [${getInventoryContext()}].
    1. Da la receta paso a paso.
    2. Identifica EXACTAMENTE qué ingredientes de la receta NO están en el inventario o tienen cantidad 0.
    3. Lista los ingredientes faltantes bajo el título "🛒 NECESITAS COMPRAR".`;

    try {
        const res = await fetch(GEMINI_URL, {
            method: "POST",
            body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
        });
        const data = await res.json();
        const markdownText = data.candidates[0].content.parts[0].text;
        
        // Convertir el formato básico de la IA a HTML legible
        responseDiv.innerHTML = markdownText
            .replace(/### (.*)/g, '<b>$1</b>')
            .replace(/\*\*(.*)\*\*/g, '<b>$1</b>')
            .replace(/\n/g, '<br>');
    } catch (e) {
        responseDiv.innerHTML = "El Chef tuvo un problema con la receta.";
    }
};
</script>


<nav>
    <div onclick="toggleView('inventory')" id="nav-inv" class="active" data-es="📦 INVENTARIO" data-en="📦 INVENTORY">📦 INVENTARIO</div>
    <div onclick="toggleView('shopping')" id="nav-shop" data-es="🛒 COMPRAS" data-en="🛒 SHOPPING">🛒 COMPRAS</div>
</nav>
<footer>
    <button onclick="shareApp()" style="width: auto; background: #2ecc71; padding: 8px 15px;" data-es="🔗 COMPARTIR CON FAMILIA" data-en="🔗 SHARE WITH FAMILY">🔗 COMPARTIR CON FAMILIA</button>    <br><br>
    XAVIER VELASTEGUI | <a href="https://xaviapps.com" target="_blank" style="color: var(--accent); text-decoration: none;">XAVIAPPS.COM</a>


</footer>
</body>
</html>
