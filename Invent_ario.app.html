<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Velastegui Pantry Gold PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; 
            --warning: #f39c12; --success: #27ae60; --expired: #9b59b6;
            --bg: #f4f7f6; --text: #333; 
        }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        header { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .container { padding: 15px; max-width: 700px; margin: auto; }
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 6px solid #ddd; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--primary); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size:15px; }
        .google-btn { background: #db4437; color: white; margin-top: 10px; }

        .status-ok { border-left-color: var(--success); }
        .status-low { border-left-color: var(--warning); }
        .status-critical { border-left-color: var(--danger); }
        .status-expired { border-left-color: var(--expired); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; z-index: 2000; }
        nav div { flex: 1; text-align: center; padding: 18px; font-weight: bold; color: #95a5a6; cursor: pointer; }
        nav div.active { color: var(--accent); border-top: 4px solid var(--accent); }
        .aisle-header { background: #eee; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin: 15px 0 5px 0; color: var(--primary); }
        .hidden { display: none !important; }

        /* Loading overlay */
        #loading-screen { position:fixed; inset:0; background:var(--primary); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; gap:16px; transition: opacity 0.4s; }
        #loading-screen.fade { opacity:0; pointer-events:none; }
        .dots { display:flex; gap:8px; }
        .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.3); animation: dp 1.2s ease-in-out infinite; }
        .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
        @keyframes dp { 0%,80%,100%{transform:scale(0.7);background:rgba(52,152,219,0.3)} 40%{transform:scale(1.3);background:#3498db} }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
    <div style="font-size:22px; font-weight:bold;">VELASTEGUI PANTRY</div>
    <div style="font-size:13px; opacity:0.5;">Verificando sesión...</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="hidden">
    <div class="auth-card">
        <h3 style="text-align:center; margin-bottom:15px;">PANTRY LOGIN</h3>
        <input id="user-name" type="text" placeholder="Tu Nombre (solo registro)">
        <input id="email" type="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Contraseña">
        <input id="family-code" type="text" placeholder="Código Familiar (opcional)" style="text-transform:uppercase; letter-spacing:3px;">
        <button onclick="handleAuth('login')">ENTRAR</button>
        <button onclick="handleAuth('register')" style="background:none; color:var(--accent); margin-top:8px; border:1px solid var(--accent);">REGISTRARSE</button>
        <hr style="margin:12px 0;">
        <button class="google-btn" onclick="loginGoogle()">🔵 CONTINUAR CON GOOGLE</button>
        <div id="auth-error" style="color:#e74c3c; font-size:12px; text-align:center; margin-top:8px; min-height:16px;"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">
    <header>
        <button onclick="logout()" style="width:auto; padding:5px 10px; background:transparent; font-size:18px;">⎋</button>
        <div id="family-display" style="font-size:13px;">CARGANDO...</div>
        <div style="width:50px;"></div>
    </header>

    <div class="container">
        <div id="view-add" class="card">
            <button onclick="startScan()" style="background:#8e44ad; margin-bottom:15px;">📷 ESCANEAR</button>
            <div id="video-container"></div>
            <input id="upc" type="text" placeholder="UPC / Código" onchange="handleUPCChange(this.value)" style="margin-bottom:10px">
            <input id="product" type="text" placeholder="Nombre Producto" style="margin-bottom:10px">
            <div class="grid-3">
                <select id="category">
                    <option>PANTRY</option><option>FRIDGE</option><option>FREEZER</option>
                    <option>CLEANING</option><option>BREAD</option><option>DRINKS</option>
                </select>
                <input id="expiry" type="date">
                <input id="qty" type="number" placeholder="Cant." value="0">
            </div>
            <div class="grid-3" style="margin-top:10px">
                <input id="min" type="number" placeholder="Min" value="1">
                <input id="max" type="number" placeholder="Max" value="10">
                <button onclick="saveItem()" style="background:var(--success)">GUARDAR</button>
            </div>
        </div>
        <div id="inventory-list"></div>
    </div>

    <nav>
        <div onclick="toggleView('inventory')" id="nav-inv" class="active">📦 STOCK</div>
        <div onclick="toggleView('shopping')" id="nav-shop">🛒 COMPRAS</div>
    </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, increment, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD8dsAejvIEFDxu_Z2YZCtMnAkXhZr1H3E",
    authDomain: "velastegui-pantry.firebaseapp.com",
    projectId: "velastegui-pantry",
    storageBucket: "velastegui-pantry.firebasestorage.app",
    messagingSenderId: "927651602097",
    appId: "1:927651602097:web:b243cfa8aff28886900c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let familyId = null;
let currentView = 'inventory';
let inventoryData = [];
let unsubInventory = null;

// ── HELPERS ──────────────────────────────────────
function showLoading(msg) {
    const s = document.getElementById('loading-screen');
    s.classList.remove('fade', 'hidden');
    s.querySelector('div:nth-child(2)').textContent = msg || 'Cargando...';
}
function hideLoading() {
    const s = document.getElementById('loading-screen');
    s.classList.add('fade');
    setTimeout(() => s.classList.add('hidden'), 450);
}
function showError(msg) {
    document.getElementById('auth-error').textContent = msg;
}

// ── ENSURE USER DOC & FAMILY ─────────────────────
async function ensureFamily(user, inviteCode) {
    const userRef = doc(db, "users", user.uid);
    const uDoc = await getDoc(userRef);

    if (uDoc.exists() && uDoc.data().familyId) {
        return uDoc.data().familyId;
    }

    // Check invite code
    if (inviteCode) {
        // Use invite code as familyId directly
        const fid = inviteCode.trim().toUpperCase();
        await setDoc(userRef, { familyId: fid, email: user.email, name: user.displayName || '' }, { merge: true });
        return fid;
    }

    // Create new family code
    const newFid = Math.random().toString(36).substring(2, 8).toUpperCase();
    await setDoc(userRef, { familyId: newFid, email: user.email, name: user.displayName || '' }, { merge: true });
    return newFid;
}

// ── AUTH ─────────────────────────────────────────
window.handleAuth = async (type) => {
    const email   = document.getElementById('email').value.trim();
    const pass    = document.getElementById('pass').value;
    const name    = document.getElementById('user-name').value.trim();
    const fCode   = document.getElementById('family-code').value.trim().toUpperCase();
    showError('');

    try {
        if (type === 'login') {
            await signInWithEmailAndPassword(auth, email, pass);
        } else {
            if (!name) return showError('Ingresa tu nombre');
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(res.user, { displayName: name });
            window._pendingCode = fCode;
        }
    } catch (e) {
        const msgs = {
            'auth/wrong-password':     'Contraseña incorrecta',
            'auth/user-not-found':     'Usuario no encontrado',
            'auth/email-already-in-use':'Email ya registrado',
            'auth/weak-password':      'Contraseña muy corta (mín. 6)',
            'auth/invalid-email':      'Email inválido',
        };
        showError(msgs[e.code] || e.message);
    }
};

window.loginGoogle = async () => {
    showError('');
    try {
        await signInWithPopup(auth, provider);
    } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') showError(e.message);
    }
};

window.logout = async () => {
    if (unsubInventory) unsubInventory();
    await signOut(auth);
};

// ── AUTH STATE ────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
    if (user) {
        showLoading('Entrando...');
        try {
            const inviteCode = window._pendingCode || null;
            window._pendingCode = null;
            familyId = await ensureFamily(user, inviteCode);

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('family-display').innerText = `👨‍👩‍👧 ${familyId}`;

            if (unsubInventory) unsubInventory();
            unsubInventory = onSnapshot(collection(db, "families", familyId, "inventory"), (snap) => {
                inventoryData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList();
            });
        } catch(e) {
            console.error('Auth error:', e);
            showError('Error al cargar: ' + e.message);
        } finally {
            hideLoading();
        }
    } else {
        familyId = null;
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
        hideLoading();
    }
});

// ── UPC LOOKUP ────────────────────────────────────
window.handleUPCChange = async (code) => {
    if (!code || !familyId) return;
    const snap = await getDoc(doc(db, "families", familyId, "inventory", code));
    if (snap.exists()) {
        const d = snap.data();
        document.getElementById('product').value  = d.name;
        document.getElementById('category').value = d.category;
        document.getElementById('expiry').value   = d.expiry || '';
        document.getElementById('qty').value      = d.qty;
        document.getElementById('min').value      = d.min;
        document.getElementById('max').value      = d.max;
        Swal.fire({ title: 'Cargado ✓', icon: 'success', timer: 800, showConfirmButton: false });
    } else {
        Swal.fire({ title: 'Buscando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const res  = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const data = await res.json();
            Swal.close();
            if (data.status === 1) {
                document.getElementById('product').value = data.product.product_name || data.product.generic_name || '';
            } else {
                Swal.fire('No encontrado', 'Ingresa el nombre manualmente', 'warning');
            }
        } catch(e) { Swal.close(); }
    }
};

// ── SCANNER ───────────────────────────────────────
window.startScan = async () => {
    const container = document.getElementById("video-container");
    container.style.display = "block";
    const { BrowserMultiFormatReader } = await import("https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm");
    const reader = new BrowserMultiFormatReader();
    const video = document.createElement("video");
    container.innerHTML = ""; container.appendChild(video);
    const controls = await reader.decodeFromVideoDevice(undefined, video, (result) => {
        if (result) {
            document.getElementById("upc").value = result.text;
            handleUPCChange(result.text);
            controls.stop();
            container.style.display = "none";
        }
    });
};

// ── CRUD ──────────────────────────────────────────
window.saveItem = async () => {
    const upc  = document.getElementById("upc").value.trim();
    const name = document.getElementById("product").value.trim();
    if (!upc || !name) return Swal.fire('Error', 'UPC y Nombre requeridos', 'error');
    await setDoc(doc(db, "families", familyId, "inventory", upc), {
        name,
        category: document.getElementById("category").value,
        expiry:   document.getElementById("expiry").value,
        qty:      +document.getElementById("qty").value,
        min:      +document.getElementById("min").value,
        max:      +document.getElementById("max").value,
        updatedAt: Date.now()
    }, { merge: true });
    Swal.fire({ title: 'Guardado ✓', icon: 'success', timer: 800, showConfirmButton: false });
    ['upc','product','qty','expiry'].forEach(id => document.getElementById(id).value = '');
};

// ── RENDER ────────────────────────────────────────
function renderList() {
    const listDiv = document.getElementById("inventory-list");
    listDiv.innerHTML = "";
    const today    = new Date();
    const nextWeek = new Date(); nextWeek.setDate(today.getDate() + 7);

    if (currentView === 'inventory') {
        if (!inventoryData.length) {
            listDiv.innerHTML = '<div style="text-align:center;color:#999;padding:40px 0;">Sin productos. ¡Agrega el primero!</div>';
            return;
        }
        const sorted = [...inventoryData].sort((a,b) => (a.expiry||'9999').localeCompare(b.expiry||'9999'));
        sorted.forEach(item => {
            const isExpired = item.expiry && new Date(item.expiry) <= today;
            const isNear    = item.expiry && new Date(item.expiry) <= nextWeek;
            let cls = item.qty === 0 ? 'status-critical' : item.qty <= item.min ? 'status-low' : 'status-ok';
            if (isNear || isExpired) cls = 'status-expired';

            const card = document.createElement("div");
            card.className = `card ${cls}`;
            card.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <b>${item.name}</b>
                    <span style="font-size:13px;"><b>${item.qty}</b> / ${item.max}</span>
                </div>
                <small style="color:#999;">${item.category} | Vence: ${item.expiry || 'N/A'}</small>
                <div class="grid-3" style="margin-top:10px">
                    <button onclick="updateQty('${item.id}', 1)"  style="background:var(--success)">+1</button>
                    <button onclick="updateQty('${item.id}', -1)" style="background:var(--warning)">-1</button>
                    <button onclick="deleteItem('${item.id}')"    style="background:var(--danger)">✕</button>
                </div>`;
            listDiv.appendChild(card);
        });
    } else {
        const needItems = inventoryData.filter(i => i.qty < i.max);
        if (!needItems.length) {
            listDiv.innerHTML = '<div style="text-align:center;color:#999;padding:40px 0;">🎉 ¡Todo completo! No hay compras pendientes.</div>';
            return;
        }
        const categories = [...new Set(needItems.map(i => i.category))];
        categories.forEach(cat => {
            const h = document.createElement("div");
            h.className = "aisle-header"; h.innerText = `PASILLO: ${cat}`;
            listDiv.appendChild(h);
            needItems.filter(i => i.category === cat).forEach(item => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;">
                        <b>${item.name}</b>
                        <small>Faltan: <b>${item.max - item.qty}</b></small>
                    </div>
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <input type="number" id="buy_${item.id}" placeholder="Cantidad comprada">
                        <button onclick="processPurchase('${item.id}')" style="flex:0 0 80px;">OK</button>
                    </div>`;
                listDiv.appendChild(card);
            });
        });
    }
}

// ── ACTIONS ───────────────────────────────────────
window.updateQty = async (id, v) => {
    const snap = await getDoc(doc(db, "families", familyId, "inventory", id));
    if (snap.exists() && snap.data().qty + v < 0) return;
    await updateDoc(doc(db, "families", familyId, "inventory", id), { qty: increment(v), updatedAt: Date.now() });
};
window.deleteItem = async (id) => {
    const res = await Swal.fire({ title: '¿Borrar?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c' });
    if (res.isConfirmed) await deleteDoc(doc(db, "families", familyId, "inventory", id));
};
window.processPurchase = async (id) => {
    const v = parseInt(document.getElementById(`buy_${id}`).value);
    if (isNaN(v) || v <= 0) return;
    await updateDoc(doc(db, "families", familyId, "inventory", id), { qty: increment(v), updatedAt: Date.now() });
    Swal.fire({ title: 'Actualizado ✓', icon: 'success', timer: 700, showConfirmButton: false });
};
window.toggleView = (v) => {
    currentView = v;
    document.getElementById('nav-inv').className  = v === 'inventory' ? 'active' : '';
    document.getElementById('nav-shop').className = v === 'shopping'  ? 'active' : '';
    renderList();
};
</script>
</body>
</html>
